<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página Web Oficial</title>
    <style>
        /* 1. Reset básico y fondo del sitio */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* 1. Ruta de la imagen (puede ser un archivo local o un enlace de internet) */
            background-color: #B3B3F1;
            background-image: url('file:///C:/Users/alumnocnm.CNM.000/Pictures/Captura%20de%20pantalla%202026-06-04%20095909.png');
    
            /* 2. Evita que la imagen se repita como mosaico */
            background-repeat: no-repeat;
        
            /* 3. Centra la imagen en la pantalla */
            background-position: center right;
        
            /* 4. Hace que la imagen cubra toda la pantalla sin deformarse */
            background-size: 75% auto;
        
            /* 5. Mantiene el fondo fijo mientras el usuario baja (efecto elegante) */
            background-attachment: fixed;
        }

        /* 2. La tarjeta contenedora (Efecto de profundidad) */
        .contenedor-oficial {
            background-color: #B3B3F1;
            ;
            padding: 40px;
            border-radius: 16px; /* Bordes redondeados modernos */
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); /* Sombra que da el efecto "profundo" */
            max-width: 500px;
            width: 100%;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease; /* Animación suave */
                display: grid;
                place-items: center;  /* Centra horizontal y verticalmente al mismo tiempo */
                min-height: 100vh;
            
        }

        /* Efecto interactivo cuando pasas el mouse por encima */
        .contenedor-oficial:hover {
            transform: translateY(-5px); /* La tarjeta "flota" ligeramente */
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.15);
        }

        /* 3. Estilos del texto */
        h1 {
            font-size: 2rem;
            color: #111111;
            margin-bottom: 15px;
            font-weight: 700;
        }

        h2 {
            font-size: 1.2rem;
            color: #4a90e2; /* Un azul profesional */
            margin-top: 30px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        p {
            font-size: 1rem;
            color: #666666;
            line-height: 1.6; /* Más espacio entre líneas para que sea fácil de leer */
        }
    </style>
</head>
<body>

    <div class="contenedor-oficial">
        <h1>¡Welcome, pagina web de mi estudio oficial!</h1>
        <p>Aquí se presenta nuestro información de nuestro estudio.</p>

        <a href="file:///C:/Users/alumnocnm.CNM.000/.vscode/fermin.py/yay.html"><h2>Sobre mí / Proyecto</h2></a>
        <p>Apreta "sobre mí" para saber más!</p>
    </div>

</body>
</html>
